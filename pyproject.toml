[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "matrixcorrect"
version = "0.1.0"
description = "Cross-platform Qualcomm CC13 color-correction matrix optimizer"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Proprietary" }
authors = [{ name = "MatrixCorrect" }]
dependencies = []

[project.scripts]
matrixcorrect = "matrixcorrect.app:main"
matrixcorrect-cli = "matrixcorrect.cli:main"

[tool.setuptools.packages.find]
include = ["matrixcorrect*"]

